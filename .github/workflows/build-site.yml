name: Build Website

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "site/**"
      - "scripts/site/**"
      - "scripts/release/**"
      - "CHANGELOG.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate website build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test release scripts
        run: pnpm test:release

      - name: Test website
        run: pnpm --filter @md-editor/site test

      - name: Check formatting
        run: pnpm format:prettier:check

      - name: Build website
        run: pnpm build:site
