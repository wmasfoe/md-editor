name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI Tauri config
        run: |
          {
            echo "TAURI_CONFIG<<TAURI_CI_CONFIG"
            cat apps/desktop/src-tauri/tauri.ci.conf.json
            echo "TAURI_CI_CONFIG"
          } >> "$GITHUB_ENV"

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test Rust
        run: pnpm test:rust

      - name: Validate release version files
        run: |
          node <<'NODE'
          const fs = require("fs");
          const rootPackage = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const desktopPackage = JSON.parse(fs.readFileSync("apps/desktop/package.json", "utf8"));
          const tauriConfig = JSON.parse(fs.readFileSync("apps/desktop/src-tauri/tauri.conf.json", "utf8"));
          const cargoToml = fs.readFileSync("apps/desktop/src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^\s*version\s*=\s*"([^"]+)"/m)?.[1];
          const versions = [rootPackage.version, desktopPackage.version, tauriConfig.version, cargoVersion];

          if (versions.some((version) => version !== tauriConfig.version)) {
            throw new Error(`Version mismatch: root=${rootPackage.version}, desktop=${desktopPackage.version}, tauri=${tauriConfig.version}, cargo=${cargoVersion}`);
          }
          NODE
