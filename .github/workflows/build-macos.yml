name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    name: Validate macOS build
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test Rust
        run: pnpm test:rust

      - name: Validate release version files
        run: |
          node <<'NODE'
          const fs = require("fs");
          const rootPackage = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const desktopPackage = JSON.parse(fs.readFileSync("apps/desktop/package.json", "utf8"));
          const tauriConfig = JSON.parse(fs.readFileSync("apps/desktop/src-tauri/tauri.conf.json", "utf8"));
          const cargoToml = fs.readFileSync("apps/desktop/src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^\s*version\s*=\s*"([^"]+)"/m)?.[1];
          const versions = [rootPackage.version, desktopPackage.version, tauriConfig.version, cargoVersion];

          if (versions.some((version) => version !== tauriConfig.version)) {
            throw new Error(`Version mismatch: root=${rootPackage.version}, desktop=${desktopPackage.version}, tauri=${tauriConfig.version}, cargo=${cargoVersion}`);
          }
          NODE

      # Distribution note:
      # A plain Tauri DMG can be built and installed locally, but macOS Gatekeeper
      # treats downloaded unsigned/unnotarized apps as untrusted. That is why users
      # may see "app is damaged" until they manually clear com.apple.quarantine.
      #
      # When you add Apple distribution support, insert the certificate/keychain
      # setup before this build step and expose the Tauri/Apple signing env vars
      # here, so the generated .app/.dmg is Developer ID signed and notarized.
      - name: Build macOS app
        run: pnpm build:macos

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: markdown-editor-macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
