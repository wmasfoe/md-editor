name: Build macOS App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to create a GitHub Release, for example v0.1.0"
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build macOS app
        run: pnpm build:macos

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: markdown-editor-macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.release_tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg \
            --title "Markdown Editor $RELEASE_TAG" \
            --notes "macOS DMG build for $RELEASE_TAG."
